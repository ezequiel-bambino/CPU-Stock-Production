<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BAMBINO CPU</title>

<style>

body{
font-family:Arial;
padding:20px;
text-align:center;
}

.logo{
width:200px;
margin:auto;
display:block;
margin-bottom:10px;
}

h1{
font-size:32px;
margin-bottom:5px;
}

.date{
color:#777;
margin-bottom:25px;
}

.tab-buttons button{
padding:10px 18px;
font-size:18px;
margin:4px;
}

/* SUCCESS */

.successBanner{
background:#4CAF50;
color:white;
padding:12px;
border-radius:8px;
margin-bottom:20px;
font-weight:bold;
display:none;
}

/* FORM */

.row{
display:grid;
grid-template-columns:auto 60px 90px 60px;
gap:10px;
align-items:center;
max-width:600px;
margin:auto;
margin-bottom:14px;
}

.ingredient{
font-weight:bold;
text-align:left;
}

.unit{
font-size:13px;
color:#666;
text-align:left;
}

.row button,
.row input{
height:42px;
font-size:18px;
}

#chefName{
width:240px;
height:40px;
font-size:18px;
margin-bottom:25px;
}

/* TABLE */

.dataTable{
width:100%;
max-width:650px;
margin:auto;
border-collapse:collapse;
}

.dataTable th{
text-align:center;
padding:10px;
border-bottom:2px solid #ddd;
font-size:15px;
}

.dataTable td{
padding:10px;
border-bottom:1px solid #eee;
font-size:16px;
text-align:center;
}

.prep{
font-weight:bold;
text-align:left;
}

/* STATUS */

.status{
padding:6px 10px;
border-radius:8px;
font-size:14px;
display:inline-block;
color:black;
}

.good{background:#8BC34A;}
.low{background:#FFC107;}
.out{background:#F44336;}

/* INFO BOX */

.infoBox{
border:1px solid #ddd;
border-radius:10px;
padding:10px;
margin-bottom:15px;
display:inline-block;
background:#fafafa;
}

/* COUNTERS */

.counterRow{
display:flex;
justify-content:center;
gap:12px;
margin-bottom:20px;
flex-wrap:wrap;
}

.counter{
padding:10px 14px;
border-radius:10px;
font-weight:bold;
font-size:15px;
color:black;
}

.counter.red{background:#F44336;}
.counter.yellow{background:#FFC107;}
.counter.green{background:#8BC34A;}

</style>

</head>

<body>

<img src="icon.png" class="logo">

<h1>BAMBINO CPU</h1>

<div id="todayDate" class="date"></div>

<div id="successBanner" class="successBanner">
✅ Stock submitted successfully
</div>

<div class="tab-buttons">

<button onclick="showTab('form')">Stock Form</button>
<button onclick="showTab('stock')">Stock Level</button>
<button onclick="showTab('prod')">Tomorrow's Production</button>
<button onclick="showTab('purchase')">Recommended Purchase</button>

</div>

<div id="tab"></div>

<script>

const URL="https://script.google.com/macros/s/AKfycbwaTJGcXIHhQgylIOFN8bWDlevvhdTi6uLJ9AqB-bSSuD2JqLzhT5aRj4HSp6b9wt3C_A/exec"

document.getElementById("todayDate").innerText=
new Date().toLocaleDateString('en-GB',{weekday:'long',day:'2-digit',month:'long'})

function showTab(t){

document.getElementById("tab").innerHTML=""

if(t==="form")loadForm()
if(t==="stock")loadStock()
if(t==="prod")loadProduction()
if(t==="purchase")loadPurchase()

}

/* SUCCESS */

function showSuccess(){

const banner=document.getElementById("successBanner")

banner.style.display="block"

setTimeout(()=>{
banner.style.display="none"
},3000)

}

/* FORM */

async function loadForm(){

const r=await fetch(URL+"?action=getIngredients")
const data=await r.json()

const tab=document.getElementById("tab")

tab.innerHTML=`<input id="chefName" placeholder="Chef name">`

data.forEach(i=>{

tab.innerHTML+=`

<div class="row">

<div>
<div class="ingredient">${i.name}</div>
<div class="unit">${i.unit||""}</div>
</div>

<button onclick="change('${i.name}',-1)">-</button>

<input id="${i.name}" type="number">

<button onclick="change('${i.name}',1)">+</button>

</div>
`

})

tab.innerHTML+=`<button onclick="submit()">SUBMIT</button>`

}

function change(id,v){

let i=document.getElementById(id)

let val=Number(i.value)||0

val+=v

if(val<0)val=0

i.value=val

}

async function submit(){

const chef=document.getElementById("chefName").value

if(!chef){alert("Chef name required");return}

const inputs=document.querySelectorAll(".row input")

let data=[]

inputs.forEach(i=>{
data.push({
name:i.id,
qty:Number(i.value)
})
})

await fetch(URL+"?action=submitStock&chef="+chef+"&data="+encodeURIComponent(JSON.stringify(data)))

showSuccess()

}

/* STOCK LEVEL */

async function loadStock(){

const r=await fetch(URL+"?action=getCurrentStock")
const d=await r.json()

const date=new Date(d.lastDate)

const formatted=
date.toLocaleDateString('en-GB')+" "+
date.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})

let out=0
let low=0
let good=0

d.rows.forEach(r=>{

const s=r.status.toLowerCase()

if(s.includes("out")) out++
else if(s.includes("low")) low++
else good++

})

/* SORT */

d.rows.sort((a,b)=>{

function rank(s){

s=s.toLowerCase()

if(s.includes("out")) return 1
if(s.includes("low")) return 2
return 3

}

return rank(a.status)-rank(b.status)

})

let html=`<div class="infoBox">Stock Level At <b>${formatted}</b></div>`

html+=`

<div class="counterRow">

<div class="counter red">🔴 ${out} Out of Stock</div>

<div class="counter yellow">🟡 ${low} Low Stock</div>

<div class="counter green">🟢 ${good} Good Stock</div>

</div>
`

html+=`<table class="dataTable">

<tr>
<th>Prep</th>
<th>Stock</th>
<th>Par</th>
<th>Status</th>
</tr>
`

d.rows.forEach(r=>{

let cls="good"

const s=r.status.toLowerCase()

if(s.includes("out")) cls="out"
else if(s.includes("low")) cls="low"

let icon="🟢"
if(cls==="out") icon="🔴"
if(cls==="low") icon="🟡"

html+=`

<tr>

<td class="prep">${r.prep}</td>
<td>${r.stock}</td>
<td>${r.par}</td>

<td>
<span class="status ${cls}">
${icon} ${r.status}
</span>
</td>

</tr>
`

})

html+="</table>"

document.getElementById("tab").innerHTML=html

}

/* PRODUCTION */

async function loadProduction(){

const r=await fetch(URL+"?action=getTomorrowProduction")
const data=await r.json()

let html=`<table class="dataTable">

<tr>
<th>Prep</th>
<th>Quantity</th>
<th>Unit</th>
</tr>
`

data.forEach(r=>{

html+=`
<tr>
<td class="prep">${r.prep}</td>
<td>${Number(r.qty).toFixed(1)}</td>
<td>${r.unit}</td>
</tr>
`

})

html+="</table>"

document.getElementById("tab").innerHTML=html

}

/* PURCHASE */

async function loadPurchase(){

const r=await fetch(URL+"?action=getRecommendedPurchase")
const data=await r.json()

let html=`<table class="dataTable">

<tr>
<th>Ingredient</th>
<th>Quantity</th>
<th>Unit</th>
</tr>
`

data.forEach(r=>{

html+=`
<tr>
<td class="prep">${r.ingredient}</td>
<td>${Number(r.qty).toFixed(1)}</td>
<td>${r.unit}</td>
</tr>
`

})

html+="</table>"

document.getElementById("tab").innerHTML=html

}

</script>

</body>
</html>
