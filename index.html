<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BAMBINO CPU</title>

<style>

body{
  font-family: Arial;
  padding:20px;
  text-align:center;
}

/* HEADER */

.logo{
  width:200px;
  margin:auto;
  display:block;
  margin-bottom:10px;
}

h1{
  font-size:32px;
  margin-bottom:5px;
}

.date{
  color:#777;
  margin-bottom:20px;
}

/* TABS */

.tab-buttons{
  margin-bottom:25px;
}

.tab-buttons button{
  padding:10px 18px;
  font-size:18px;
  margin:4px;
}

/* FORM */

.row{
  display:grid;
  grid-template-columns: 1fr 60px 90px 60px; /* 🔥 FIX REAL */
  gap:12px;
  align-items:center;
  max-width:700px;
  margin:auto;
  margin-bottom:14px;
}

.ingredient{
  font-weight:bold;
  text-align:left;
}

.unit{
  font-size:13px;
  color:#666;
  text-align:left;
}

.row button{
  width:60px;
  height:42px;
  font-size:18px;
}

.row input{
  width:90px;
  height:42px;
  font-size:22px;
  text-align:center;
}

/* CATEGORY */

.categoryTitle{
  font-size:20px;
  margin:30px 0 10px 0;
  font-weight:bold;
}

/* TOP CONTROLS */

#topControls{
  margin-top:10px;
  margin-bottom:10px;
}

#chefName{
  width:260px;
  height:42px;
  font-size:18px;
  text-align:center;
  margin-bottom:10px;
}

/* BUTTONS */

#submitStockBtn{
  padding:10px 18px;
  font-size:18px;
  margin-top:20px;
}

#newStockBtn{
  padding:10px 18px;
  font-size:16px;
  margin-top:10px;
}

/* INFO */

.infoBox{
  border:1px solid #ddd;
  border-radius:10px;
  padding:10px;
  margin-top:10px;
  display:inline-block;
  background:#fafafa;
}

/* TABLE ETC (NO TOCAR) */

.dataTable{
  width:100%;
  max-width:650px;
  margin:auto;
  border-collapse:collapse;
}

.dataTable th{
  text-align:center;
  padding:10px;
  border-bottom:2px solid #ddd;
}

.dataTable td{
  padding:10px;
  border-bottom:1px solid #eee;
  text-align:center;
}

.prep{
  font-weight:bold;
  text-align:left;
}

.status{
  padding:6px 10px;
  border-radius:8px;
}

.good{ background:#8BC34A; }
.low{ background:#FFC107; }
.out{ background:#F44336; }

.counterRow{
  display:flex;
  justify-content:center;
  gap:12px;
  margin-bottom:20px;
  flex-wrap:wrap;
}

.counter{
  padding:10px 14px;
  border-radius:10px;
  font-weight:bold;
}

.counter.red{ background:#F44336; }
.counter.yellow{ background:#FFC107; }
.counter.green{ background:#8BC34A; }

</style>
</head>

<body>

<img src="icon.png" class="logo">
<h1>BAMBINO CPU</h1>
<div id="todayDate" class="date"></div>

<div class="tab-buttons">
<button onclick="showTab('form')">Stock Form</button>
<button onclick="showTab('stock')">Stock Level</button>
<button onclick="showTab('prod')">Tomorrow's Production</button>
<button onclick="showTab('purchase')">Recommended Purchase</button>
</div>

<div id="tab"></div>

<script>

const URL="https://script.google.com/macros/s/AKfycbyhEMh2GCCSz-bDB6SF51B7yxKbt4RuvT5Kz769JmTlvWMed2MdqKV6phw13Ym8GSB_ow/exec";

document.getElementById("todayDate").innerText =
new Date().toLocaleDateString('en-GB',{weekday:'long',day:'2-digit',month:'long'});

/* TABS */

function showTab(t){
document.getElementById("tab").innerHTML="";
if(t==="form") loadForm();
if(t==="stock") loadStock();
if(t==="prod") loadProduction();
if(t==="purchase") loadPurchase();
}

/* FORM */

async function loadForm(){

const saved = JSON.parse(localStorage.getItem("lastStock"));
const r = await fetch(URL+"?action=getIngredients");
const data = await r.json();

const tab=document.getElementById("tab");

tab.innerHTML=`<div id="topControls"></div>`;
const top=document.getElementById("topControls");

const container=document.createElement("div");
container.id="formRows";
tab.appendChild(container);

/* CHEF */

const chefInput=document.createElement("input");
chefInput.id="chefName";
chefInput.placeholder="Chef name";

if(saved){
chefInput.value=saved.chef;
chefInput.disabled=true;
}

top.appendChild(chefInput);

/* CATEGORIES */

const dry = data.filter(i=>i.category==="Dry Store");
const cold = data.filter(i=>i.category==="Cold Room");

function renderGroup(title, items){

if(items.length===0) return;

const t=document.createElement("div");
t.className="categoryTitle";
t.innerText=title;
container.appendChild(t);

items.forEach(i=>{

const row=document.createElement("div");
row.className="row";

const val = saved ? (saved.data.find(x=>x.name===i.name)?.qty || 0) : "";

row.innerHTML=`
<div>
<div class="ingredient">${i.name}</div>
<div class="unit">${i.unit||""}</div>
</div>

<button onclick="change('${i.name}',-1)">-</button>
<input id="${i.name}" type="number" value="${val}">
<button onclick="change('${i.name}',1)">+</button>
`;

container.appendChild(row);

});

}

renderGroup("Dry Store", dry);
renderGroup("Cold Room", cold);

/* SUBMIT */

const submit=document.createElement("button");
submit.id="submitStockBtn";
submit.innerText="SUBMIT";
submit.onclick=submitStock;

if(saved){
submit.style.display="none";
}

tab.appendChild(submit);

/* NEW STOCK */

if(saved){

const newBtn=document.createElement("button");
newBtn.id="newStockBtn";
newBtn.innerText="NEW STOCK";

newBtn.onclick=()=>{
localStorage.removeItem("lastStock");
loadForm();
};

tab.appendChild(newBtn);

/* INFO */

const info=document.createElement("div");
info.className="infoBox";
info.innerText="Last update at "+saved.time;
tab.appendChild(info);

/* BLOQUEAR */

document.querySelectorAll("#formRows input,#formRows button,#chefName").forEach(el=>{
el.disabled=true;
});

}

}

/* CHANGE */

function change(id,v){
let i=document.getElementById(id);
let val=Number(i.value)||0;
val+=v;
if(val<0) val=0;
i.value=val;
}

/* SUBMIT */

async function submitStock(){

if(!confirm("Are you sure Chef?")) return;

const chef=document.getElementById("chefName").value;

if(!chef){
alert("Chef name required");
return;
}

document.querySelectorAll("#formRows input,#formRows button,#chefName").forEach(el=>{
el.disabled=true;
});

document.getElementById("submitStockBtn").disabled=true;

const inputs=document.querySelectorAll(".row input");

let data=[];

inputs.forEach(i=>{
data.push({name:i.id,qty:Number(i.value)});
});

await fetch(URL+"?action=submitStock&chef="+chef+"&data="+encodeURIComponent(JSON.stringify(data)));

const now=new Date();
const formatted=now.toLocaleDateString('en-GB')+" "+
now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});

localStorage.setItem("lastStock", JSON.stringify({
chef:chef,
data:data,
time:formatted
}));

alert("Submitted");

loadForm();

}

/* RESTO NO CAMBIA */

async function loadStock(){/* igual que antes */}
async function loadProduction(){/* igual */}
async function loadPurchase(){/* igual */}

</script>

</body>
</html>
