<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BAMBINO CPU</title>

<style>

body{
  font-family: Arial;
  padding:20px;
  text-align:center;
}

.logo{
  width:200px;
  margin:auto;
  display:block;
  margin-bottom:10px;
}

h1{
  font-size:32px;
  margin-bottom:5px;
}

.date{
  color:#777;
  margin-bottom:25px;
}

/* TABS */

.tab-buttons button{
  padding:10px 18px;
  font-size:18px;
  margin:4px;
}

/* TOP CONTROLS */

#topControls{
  margin-top:25px;
  margin-bottom:15px;
}

/* FORM ROW (FIX TABLET) */

.row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  max-width:600px;
  margin:10px auto;
  gap:10px;
}

.left{
  flex:1;
  text-align:left;
}

.ingredient{
  font-weight:bold;
}

.unit{
  font-size:13px;
  color:#666;
}

/* CONTROLS */

.controls{
  display:flex;
  align-items:center;
  gap:8px;
}

.controls button{
  width:50px;
  height:36px;
  font-size:18px;
}

.controls input{
  width:70px;
  height:36px;
  font-size:22px;
  text-align:center;
}

/* CATEGORY */

.categoryTitle{
  font-size:20px;
  margin:25px 0 10px 0;
  font-weight:bold;
}

/* CHEF */

#chefName{
  width:240px;
  height:40px;
  font-size:18px;
  text-align:center;
}

/* BUTTONS */

#submitStockBtn{
  padding:10px 18px;
  font-size:16px;
  margin-top:20px;
}

#newStockBtn{
  padding:10px 18px;
  font-size:16px;
}

/* TABLE + STATUS (igual que antes) */

.dataTable{
  width:100%;
  max-width:650px;
  margin:auto;
  border-collapse:collapse;
}

.dataTable th{
  padding:10px;
  border-bottom:2px solid #ddd;
}

.dataTable td{
  padding:10px;
  border-bottom:1px solid #eee;
}

.prep{
  font-weight:bold;
  text-align:left;
}

.status{
  padding:6px 10px;
  border-radius:8px;
}

.good{ background:#8BC34A; }
.low{ background:#FFC107; }
.out{ background:#F44336; }

</style>
</head>

<body>

<img src="icon.png" class="logo">
<h1>BAMBINO CPU</h1>
<div id="todayDate" class="date"></div>

<div class="tab-buttons">
<button onclick="showTab('form')">Stock Form</button>
<button onclick="showTab('stock')">Stock Level</button>
<button onclick="showTab('prod')">Tomorrow's Production</button>
<button onclick="showTab('purchase')">Recommended Purchase</button>
</div>

<div id="tab"></div>

<script>

const URL="https://script.google.com/macros/s/AKfycbyhEMh2GCCSz-bDB6SF51B7yxKbt4RuvT5Kz769JmTlvWMed2MdqKV6phw13Ym8GSB_ow/exec";

document.getElementById("todayDate").innerText =
new Date().toLocaleDateString('en-GB',{weekday:'long',day:'2-digit',month:'long'});

/* TABS */

function showTab(t){
document.getElementById("tab").innerHTML="";
if(t==="form") loadForm();
if(t==="stock") loadStock();
if(t==="prod") loadProduction();
if(t==="purchase") loadPurchase();
}

/* FORM */

async function loadForm(){

const r = await fetch(URL+"?action=getIngredients");
const data = await r.json();

const submitted = localStorage.getItem("submitted")==="true";
const savedData = JSON.parse(localStorage.getItem("lastStock")||"[]");
const savedChef = localStorage.getItem("lastChef") || "";

const tab=document.getElementById("tab");

/* TOP */

tab.innerHTML=`<div id="topControls"></div>`;
const top=document.getElementById("topControls");

/* SI YA ESTA SUBMITTED */

if(submitted){

const btn=document.createElement("button");
btn.id="newStockBtn";
btn.innerText="NEW STOCK";

btn.onclick=()=>{
localStorage.clear();
loadForm();
};

top.appendChild(btn);

}else{

top.innerHTML=`<input id="chefName" placeholder="Chef name">`;

}

/* FORM */

const container=document.createElement("div");
tab.appendChild(container);

const dry = data.filter(i=>i.category==="Dry Store");
const cold = data.filter(i=>i.category==="Cold Room");

function getSavedValue(name){
const found = savedData.find(x=>x.name===name);
return found ? found.qty : "";
}

function renderGroup(title, items){

if(items.length===0) return;

const t=document.createElement("div");
t.className="categoryTitle";
t.innerText=title;
container.appendChild(t);

items.forEach(i=>{

const row=document.createElement("div");
row.className="row";

row.innerHTML=`
<div class="left">
<div class="ingredient">${i.name}</div>
<div class="unit">${i.unit||""}</div>
</div>

<div class="controls">
<button onclick="change('${i.name}',-1)" ${submitted?"disabled":""}>-</button>
<input id="${i.name}" type="number" value="${getSavedValue(i.name)}" ${submitted?"disabled":""}>
<button onclick="change('${i.name}',1)" ${submitted?"disabled":""}>+</button>
</div>
`;

container.appendChild(row);

});

}

renderGroup("Dry Store", dry);
renderGroup("Cold Room", cold);

/* SUBMIT */

if(!submitted){

const submit=document.createElement("button");
submit.id="submitStockBtn";
submit.innerText="SUBMIT";

submit.onclick=async ()=>{

if(!confirm("Are you sure Chef?")) return;

const chef=document.getElementById("chefName").value;

if(!chef){
alert("Chef name required");
return;
}

const inputs=document.querySelectorAll(".controls input");

let data=[];

inputs.forEach(i=>{
data.push({name:i.id,qty:Number(i.value)});
});

/* GUARDAR LOCAL */

localStorage.setItem("lastStock", JSON.stringify(data));
localStorage.setItem("lastChef", chef);
localStorage.setItem("submitted","true");

/* ENVIAR */

await fetch(URL+"?action=submitStock&chef="+chef+"&data="+encodeURIComponent(JSON.stringify(data)));

alert("Submitted");

loadForm();

};

tab.appendChild(submit);

}

}

/* CHANGE */

function change(id,v){
let i=document.getElementById(id);
let val=Number(i.value)||0;
val+=v;
if(val<0) val=0;
i.value=val;
}

/* RESTO (igual que antes) */

async function loadStock(){/* igual */}
async function loadProduction(){/* igual */}
async function loadPurchase(){/* igual */}

</script>

</body>
</html>
