<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BAMBINO CPU</title>

<style>

body{
  font-family: Arial;
  padding:20px;
  text-align:center;
}

.logo{
  width:200px;
  margin:auto;
  display:block;
  margin-bottom:10px;
}

h1{
  font-size:32px;
  margin-bottom:5px;
}

.date{
  color:#777;
  margin-bottom:25px;
}

/* TABS */

.tab-buttons button{
  padding:10px 18px;
  font-size:18px;
  margin:4px;
}

/* FORM */

.row{
  display:flex;              
  align-items:center;
  gap:10px;
  max-width:600px;
  margin:auto;
  margin-bottom:14px;
}

.row > .ingredientContainer{
  flex:1;                    
  text-align:left;
}

.row input{
  width:70px;                 
  height:40px;
  font-size:22px;
  text-align:center;
  flex-shrink:0;              
}

.row button{
  width:50px;
  height:36px;
  font-size:18px;
  flex-shrink:0;              
}

.ingredient{
  font-weight:bold;
  text-align:left;
}

.unit{
  font-size:13px;
  color:#666;
  text-align:left;
}

.categoryTitle{
  font-size:20px;
  margin:25px 0 10px 0;
  font-weight:bold;
}

/* CHEF */

#chefName{
  width:240px;
  height:40px;
  font-size:18px;
  margin:20px auto 30px auto; 
  display:block;
  text-align:center;
}

/* SUBMIT */

#submitStockBtn{
  padding:8px 16px;
  font-size:16px;
  margin-top:20px;
}

/* NEW STOCK */

#newStockBtn{
  padding:6px 14px;
  font-size:15px;
  margin-bottom:10px;
}

/* INFO BOX */

.infoBox{
  border:1px solid #ddd;
  border-radius:10px;
  padding:10px;
  margin-bottom:20px;
  display:inline-block;
  background:#fafafa;
  font-weight: normal;
}

/* TABLE */

.dataTable{
  width:100%;
  max-width:650px;
  margin:auto;
  border-collapse:collapse;
}

.dataTable th{
  text-align:center;
  padding:10px;
  border-bottom:2px solid #ddd;
  font-size:15px;
}

.dataTable td{
  padding:10px;
  border-bottom:1px solid #eee;
  font-size:16px;
  text-align:center;
}

.prep{
  font-weight:bold;
  text-align:left;
}

/* STATUS */

.status{
  padding:6px 10px;
  border-radius:8px;
  font-size:14px;
  display:inline-block;
  color:black;
}

.good{ background:#8BC34A; }
.low{ background:#FFC107; }
.out{ background:#F44336; }

/* COUNTERS */

.counterRow{
  display:flex;
  justify-content:center;
  gap:12px;
  margin-bottom:20px;
  flex-wrap:wrap;
}

.counter{
  padding:10px 14px;
  border-radius:10px;
  font-weight:bold;
  font-size:15px;
  color:black;
}

.counter.red{ background:#F44336; }
.counter.yellow{ background:#FFC107; }
.counter.green{ background:#8BC34A; }

</style>
</head>

<body>

<img src="icon.png" class="logo">

<h1>BAMBINO CPU</h1>

<div id="todayDate" class="date"></div>

<div class="tab-buttons">
<button onclick="showTab('form')">Stock Form</button>
<button onclick="showTab('stock')">Stock Level</button>
<button onclick="showTab('prod')">Tomorrow's Production</button>
<button onclick="showTab('purchase')">Recommended Purchase</button>
</div>

<div id="tab"></div>

<script>

const URL="https://script.google.com/macros/s/AKfycbyhEMh2GCCSz-bDB6SF51B7yxKbt4RuvT5Kz769JmTlvWMed2MdqKV6phw13Ym8GSB_ow/exec";

document.getElementById("todayDate").innerText =
new Date().toLocaleDateString('en-GB',{weekday:'long',day:'2-digit',month:'long'});

/* TABS */

function showTab(t){
  document.getElementById("tab").innerHTML="";
  if(t==="form") loadForm();
  if(t==="stock") loadStock();
  if(t==="prod") loadProduction();
  if(t==="purchase") loadPurchase();
}

/* FORM */

async function loadForm(){

  const r = await fetch(URL+"?action=getIngredients");
  const data = await r.json();

  const tab=document.getElementById("tab");

  tab.innerHTML = ""; // limpiar tab

  const container=document.createElement("div");
  container.id="formRows";
  tab.appendChild(container);

  /* RESTAURAR ULTIMO SUBMIT SI EXISTE */
  const last = localStorage.getItem("lastStockSubmit");
  if(last){
    const lastData = JSON.parse(last);

    // CARTEL LAST UPDATE arriba
    const lastUpdateDiv = document.createElement("div");
    lastUpdateDiv.className="infoBox";
    const lastTime = new Date(lastData.time || Date.now());
    lastUpdateDiv.innerHTML = `<b>Last update at ${lastTime.toLocaleDateString('en-GB')} ${lastTime.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}</b>`;
    tab.appendChild(lastUpdateDiv);

    // BOTON NEW STOCK debajo del cartel
    const newBtn=document.createElement("button");
    newBtn.id="newStockBtn";
    newBtn.innerText="NEW STOCK";
    newBtn.onclick=()=> {
      localStorage.removeItem("lastStockSubmit"); // limpiar submit
      loadForm(); // recargar formulario vacío
    };

    const newBtnContainer=document.createElement("div");
    newBtnContainer.style.textAlign="center";
    newBtnContainer.style.marginBottom="10px";
    newBtnContainer.appendChild(newBtn);
    tab.appendChild(newBtnContainer);
  }

  // INPUT CHEF name debajo del cartel NEW STOCK
  const topControls = document.createElement("div");
  topControls.id="topControls";
  topControls.innerHTML = `<input id="chefName" placeholder="Chef name">`;
  tab.appendChild(topControls);

  // llenar input si había submit
  if(last){
    const lastData = JSON.parse(last);
    document.getElementById("chefName").value = lastData.chef;
  }

  /* SEPARAR CATEGORIAS */

  const dry = data.filter(i=>i.category==="Dry Store");
  const cold = data.filter(i=>i.category==="Cold Room");

  function renderGroup(title, items){

    if(items.length===0) return;

    const t=document.createElement("div");
    t.className="categoryTitle";
    t.innerText=title;
    container.appendChild(t);

    items.forEach(i=>{

      const row=document.createElement("div");
      row.className="row";

      row.innerHTML=`
        <div class="ingredientContainer">
          <div class="ingredient">${i.name}</div>
          <div class="unit">${i.unit||""}</div>
        </div>
        <button onclick="change('${i.name}',-1)">-</button>
        <input id="${i.name}" type="number">
        <button onclick="change('${i.name}',1)">+</button>
      `;

      container.appendChild(row);

    });

  }

  renderGroup("Dry Store", dry);
  renderGroup("Cold Room", cold);

  /* SUBMIT */

  const submit=document.createElement("button");
  submit.id="submitStockBtn";
  submit.innerText="SUBMIT";
  submit.onclick=submitStock;
  tab.appendChild(submit);

  // bloquear inputs si existía submit
  if(last){
    const lastData = JSON.parse(last);
    lastData.data.forEach(d=>{
      const input = document.getElementById(d.name);
      if(input) input.value = d.qty;
    });
    document.querySelectorAll("#formRows input,#formRows button,#chefName").forEach(el=>{
      el.disabled=true;
    });
    document.getElementById("submitStockBtn").disabled=true;
  }

}

/* CHANGE */

function change(id,v){
  let i=document.getElementById(id);
  let val=Number(i.value)||0;
  val+=v;
  if(val<0) val=0;
  i.value=val;
}

/* SUBMIT */

async function submitStock(){

  if(!confirm("Are you sure Chef?")) return;

  const chef=document.getElementById("chefName").value;

  if(!chef){
    alert("Chef name required");
    return;
  }

  document.querySelectorAll("#formRows input,#formRows button,#chefName").forEach(el=>{
    el.disabled=true;
  });

  document.getElementById("submitStockBtn").disabled=true;

  const inputs=document.querySelectorAll(".row input");

  let data=[];

  inputs.forEach(i=>{
    data.push({name:i.id,qty:Number(i.value)});
  });

  await fetch(URL+"?action=submitStock&chef="+chef+"&data="+encodeURIComponent(JSON.stringify(data)));

  // Guardar en localStorage con fecha
  localStorage.setItem("lastStockSubmit", JSON.stringify({chef:chef,data:data,time:Date.now()}));

  alert("Submitted");

  loadForm(); // recarga la tab para mostrar NEW STOCK y Last update
}

/* RESTO IGUAL */

async function loadStock(){ /* igual que antes */ 
  const r=await fetch(URL+"?action=getCurrentStock");
  const d=await r.json();

  const date=new Date(d.lastDate);
  const formatted=date.toLocaleDateString('en-GB')+" "+
  date.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});

  let out=0, low=0, good=0;

  d.rows.forEach(r=>{
    const s=r.status.toLowerCase();
    if(s.includes("out")) out++;
    else if(s.includes("low")) low++;
    else good++;
  });

  d.rows.sort((a,b)=>{
    function rank(s){
      s=s.status.toLowerCase();
      if(s.includes("out")) return 1;
      if(s.includes("low")) return 2;
      return 3;
    }
    return rank(a)-rank(b);
  });

  let html=`
  <div class="infoBox">
  Stock Level At <b>${formatted}</b>
  </div>

  <div class="counterRow">
  <div class="counter red">🔴 ${out} Out of Stock</div>
  <div class="counter yellow">🟡 ${low} Low Stock</div>
  <div class="counter green">🟢 ${good} Good Stock</div>
  </div>

  <table class="dataTable">
  <tr>
  <th>Prep</th>
  <th>Stock</th>
  <th>Par</th>
  <th>Status</th>
  </tr>
  `;

  d.rows.forEach(r=>{
    let cls="good";
    const s=r.status.toLowerCase();
    if(s.includes("out")) cls="out";
    else if(s.includes("low")) cls="low";

    let icon="🟢";
    if(cls==="out") icon="🔴";
    if(cls==="low") icon="🟡";

    html+=`
    <tr>
    <td class="prep">${r.prep}</td>
    <td>${r.stock}</td>
    <td>${r.par}</td>
    <td><span class="status ${cls}">${icon} ${r.status}</span></td>
    </tr>
    `;
  });

  html+="</table>";
  document.getElementById("tab").innerHTML=html;
}

async function loadProduction(){ /* igual que antes */
  const r=await fetch(URL+"?action=getTomorrowProduction");
  const data = await r.json();

  let html=`<table class="dataTable">
  <tr><th>Prep</th><th>Quantity</th><th>Unit</th></tr>`;

  data.forEach(r=>{
    let qty=parseFloat(String(r.qty).replace(",",".")); 
    if(qty>0){
      html+=`<tr>
      <td class="prep">${r.prep}</td>
      <td>${Math.round(qty)}</td>
      <td>${r.unit}</td>
      </tr>`;
    }
  });

  html+="</table>";
  document.getElementById("tab").innerHTML=html;
}

async function loadPurchase(){ /* igual que antes */
  const r = await fetch(URL+"?action=getRecommendedPurchase");
  const data = await r.json();

  let html=`<table class="dataTable">
  <tr><th>Ingredient</th><th>Quantity</th><th>Unit</th></tr>`;

  data.forEach(r=>{
    html+=`<tr>
    <td class="prep">${r.ingredient}</td>
    <td>${r.qty}</td>
    <td>${r.unit}</td>
    </tr>`;
  });

  html+="</table>";
  document.getElementById("tab").innerHTML=html;
}

</script>

</body>
</html>
