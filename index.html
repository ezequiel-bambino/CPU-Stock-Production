<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>BAMBINO CPU</title>

<style>

body{
font-family:Arial;
padding:20px;
text-align:center;
}

.logo{
width:200px;
margin:auto;
display:block;
margin-bottom:10px;
}

h1{
font-size:32px;
margin-bottom:5px;
}

.date{
color:#777;
margin-bottom:25px;
}

.tab-buttons button{
padding:10px 18px;
font-size:18px;
margin:4px;
}

/* FORM */

.row{
display:grid;
grid-template-columns:auto 60px 90px 60px;
gap:10px;
align-items:center;
max-width:600px;
margin:auto;
margin-bottom:14px;
}

.ingredient{
font-weight:bold;
text-align:left;
}

.unit{
font-size:13px;
color:#666;
text-align:left;
}

.row button,
.row input{

height:42px;
font-size:18px;

}

#chefName{

width:240px;
height:40px;
font-size:18px;
margin-bottom:25px;

}

/* TABLE STYLE */

.dataTable{

width:100%;
max-width:650px;
margin:auto;
border-collapse:collapse;

}

.dataTable th{

text-align:left;
padding:10px;
border-bottom:2px solid #ddd;
font-size:15px;

}

.dataTable td{

padding:10px;
border-bottom:1px solid #eee;
font-size:16px;

}

.prep{
font-weight:bold;
}

/* STATUS */

.status{

padding:6px 10px;
border-radius:8px;
font-size:14px;
display:inline-block;
color:black;

}

.good{
background:#8BC34A;
}

.low{
background:#FFC107;
}

.out{
background:#F44336;
}

/* BOX */

.infoBox{

border:1px solid #ddd;
border-radius:10px;
padding:10px;
margin-bottom:20px;
display:inline-block;
background:#fafafa;

}

</style>

</head>

<body>

<img src="icon.png" class="logo">

<h1>BAMBINO CPU</h1>

<div id="todayDate" class="date"></div>

<div class="tab-buttons">

<button onclick="showTab('form')">Stock Form</button>

<button onclick="showTab('stock')">Stock Level</button>

<button onclick="showTab('prod')">Tomorrow's Production</button>

<button onclick="showTab('purchase')">Recommended Purchase</button>

</div>

<div id="tab"></div>

<script>

const URL="https://script.google.com/macros/s/AKfycbzxzTdcEylbgcmYZIkecQgsPLmWtziysiPdvCwNwpX6FPVhI8jW5jQMwA-8MOigRJjxOA/exec"

document.getElementById("todayDate").innerText=new Date().toLocaleDateString('en-GB',{weekday:'long',day:'2-digit',month:'long'})

function showTab(t){

document.getElementById("tab").innerHTML=""

if(t==="form")loadForm()
if(t==="stock")loadStock()
if(t==="prod")loadProduction()
if(t==="purchase")loadPurchase()

}

/* FORM */

async function loadForm(){

const r=await fetch(URL+"?action=getIngredients")
const data=await r.json()

const tab=document.getElementById("tab")

tab.innerHTML=`<input id="chefName" placeholder="Chef name">`

data.forEach(i=>{

tab.innerHTML+=`

<div class="row">

<div>

<div class="ingredient">${i.name}</div>
<div class="unit">${i.unit||""}</div>

</div>

<button onclick="change('${i.name}',-1)">-</button>

<input id="${i.name}" type="number">

<button onclick="change('${i.name}',1)">+</button>

</div>

`

})

tab.innerHTML+=`<button onclick="submit()">SUBMIT</button>`

}

function change(id,v){

let i=document.getElementById(id)

let val=Number(i.value)||0

val+=v

if(val<0)val=0

i.value=val

}

async function submit(){

const chef=document.getElementById("chefName").value

if(!chef){alert("Chef name required");return}

const inputs=document.querySelectorAll(".row input")

let data=[]

inputs.forEach(i=>{

data.push({
name:i.id,
qty:Number(i.value)
})

})

await fetch(URL+"?action=submitStock&chef="+chef+"&data="+encodeURIComponent(JSON.stringify(data)))

alert("Submitted")

}

/* STOCK */

async function loadStock(){

const r=await fetch(URL+"?action=getCurrentStock")
const d=await r.json()

const date=new Date(d.lastDate)

const formatted=
date.toLocaleDateString('en-GB')+" "+
date.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})

let html=`<div class="infoBox">Stock Level At <b>${formatted}</b></div>`

html+=`<table class="dataTable">
<tr>
<th>Prep</th>
<th>Stock</th>
<th>Par</th>
<th>Status</th>
</tr>`

d.rows.forEach(r=>{

let s="good"

if(r.status==="Out of stock")s="out"
if(r.status==="Low stock")s="low"

html+=`

<tr>

<td class="prep">${r.prep}</td>

<td>${r.stock}</td>

<td>${r.par}</td>

<td><span class="status ${s}">${r.status}</span></td>

</tr>

`

})

html+="</table>"

document.getElementById("tab").innerHTML=html

}

/* PRODUCTION */

async function loadProduction(){

const r=await fetch(URL+"?action=getTomorrowProduction")
const data=await r.json()

let html=`<table class="dataTable">

<tr>
<th>Prep</th>
<th>Quantity</th>
<th>Unit</th>
</tr>`

data.forEach(r=>{

html+=`
<tr>
<td class="prep">${r.prep}</td>
<td>${r.qty}</td>
<td>${r.unit}</td>
</tr>
`

})

html+="</table>"

document.getElementById("tab").innerHTML=html

}

/* PURCHASE */

async function loadPurchase(){

const r=await fetch(URL+"?action=getRecommendedPurchase")
const data=await r.json()

let html=`<table class="dataTable">

<tr>
<th>Ingredient</th>
<th>Quantity</th>
<th>Unit</th>
</tr>`

data.forEach(r=>{

html+=`
<tr>
<td class="prep">${r.ingredient}</td>
<td>${r.qty}</td>
<td>${r.unit}</td>
</tr>
`

})

html+="</table>"

document.getElementById("tab").innerHTML=html

}

</script>

</body>
</html>
